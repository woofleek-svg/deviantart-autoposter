version: '3.8'

services:
  # MySQL Database
  mysql-db:
    image: mysql:8.0
    container_name: art-crosspost-mysql
    restart: unless-stopped
    environment:
      - MYSQL_ROOT_PASSWORD=${DB_ROOT_PASSWORD}
      - MYSQL_DATABASE=${DB_NAME:-artwork_tracker}
      - MYSQL_USER=${DB_USER:-artwork_user}
      - MYSQL_PASSWORD=${DB_PASSWORD}
    volumes:
      - mysql-data:/var/lib/mysql
      - ./config/mysql-init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - ./config/my.cnf:/etc/mysql/conf.d/custom.cnf:ro
      - mysql-logs:/var/log/mysql
    ports:
      - "3306:3306"  # Exposed for development/migration, will be internal-only in swarm
    networks:
      - app-network
    command: --default-authentication-plugin=mysql_native_password

  # Backend API server
  backend:
    build: ./backend
    ports:
      - "3001:3001"
    container_name: art-crosspost-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      - NODE_ENV=production
      - PORT=3001
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:3000}
    volumes:
      # Persist state files for Instagram token management
      - ./backend/state:/app/state
      # Persist logs
      - ./backend/logs:/app/logs
    depends_on:
      - mysql-db
    networks:
      - app-network

  # Frontend React app (production)
  frontend:
    build:
      context: .
      args:
        - VITE_BACKEND_URL=${BACKEND_URL:-http://localhost:3001}
    ports:
      - "80:80"   # HTTP (redirects to HTTPS)
      - "443:443" # HTTPS
    container_name: art-crosspost-frontend
    restart: unless-stopped
    environment:
      - NODE_ENV=production
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - ./ssl_params.conf:/etc/nginx/conf.d/ssl_params.conf
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/lib/letsencrypt:/var/lib/letsencrypt:ro
      - /var/www/html:/var/www/html:ro
    depends_on:
      - backend
    networks:
      - app-network

  # SSL Certificate generation and renewal
  certbot:
    image: certbot/certbot
    container_name: art-crosspost-certbot
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt
      - /var/lib/letsencrypt:/var/lib/letsencrypt
      - /var/www/html:/var/www/html
    environment:
      - CERTBOT_EMAIL=${CERTBOT_EMAIL}
    command: sh -c "certonly --webroot --webroot-path=/var/www/html --email $CERTBOT_EMAIL --agree-tos --no-eff-email -d ${FRONTEND_DOMAIN:-your-domain.com}"
    profiles:
      - ssl

  # Development services (optional)
  backend-dev:
    build: ./backend
    ports:
      - "3002:3001"
    container_name: art-crosspost-backend-dev
    volumes:
      - ./backend:/app
      - /app/node_modules
      # Persist state files for Instagram token management
      - ./backend/state:/app/state
      # Persist logs
      - ./backend/logs:/app/logs
    env_file:
      - ./backend/.env
    environment:
      - NODE_ENV=development
      - PORT=3001
      - FRONTEND_URL=http://localhost:3000
    command: npm run dev
    depends_on:
      - mysql-db
    networks:
      - app-network
    profiles:
      - dev

  frontend-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "3003:3000"
    container_name: art-crosspost-frontend-dev
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - VITE_BACKEND_URL=http://localhost:3001
    depends_on:
      - backend-dev
    networks:
      - app-network
    profiles:
      - dev

# Persistent volumes for MySQL data
volumes:
  mysql-data:
    driver: local
  mysql-logs:
    driver: local

# Networks for service communication
networks:
  app-network:
    driver: bridge
