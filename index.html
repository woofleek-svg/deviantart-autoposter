    <title>Art Gallery</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&family=Creepster&family=Roboto+Slab:wght@300;400;700&family=Special+Elite&display=swap" rel="stylesheet">
    <!-- Google Analytics (optional - set VITE_GA_TRACKING_ID in your .env) -->
    <script>
      (function() {
        var id = '%VITE_GA_TRACKING_ID%';
        if (!id || id === '' || id.indexOf('VITE_') === 0) return;
        var s = document.createElement('script');
        s.async = true;
        s.src = 'https://www.googletagmanager.com/gtag/js?id=' + id;
        document.head.appendChild(s);
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        window.gtag = gtag;
        gtag('js', new Date());
        gtag('config', id);
      })();
    </script>
  </head>

    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
